name: Discord Notifications

on:
  pull_request:
    types: [opened, closed, merged]
  issues:
    types: [opened, closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Discord PR Notification
        if: github.event_name == 'pull_request'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            📬 PR #${{ github.event.number }}: ${{ github.event.pull_request.title }}
            By: ${{ github.actor }} | Status: ${{ github.event.action }}
            ${{ github.event.pull_request.html_url }}
            
      - name: Discord Issue Notification
        if: github.event_name == 'issues'
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🐛 Issue #${{ github.event.number }}: ${{ github.event.issue.title }}
            By: ${{ github.actor }} | Action: ${{ github.event.action }}
            ${{ github.event.issue.html_url }}
