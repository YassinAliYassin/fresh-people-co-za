# Stale Bot Configuration
# Closes stale issues/PRs after inactivity

stale:
  issues: true
  pull_requests: true
  
  # Days before an issue/PR becomes stale
  days_to_stale: 30
  
  # Days before a stale issue/PR is closed
  days_to_close: 7
  
  # Exempt labels (never marked stale)
  exempt_labels:
    - pinned
    - security
    - enhancement
    - bug
    
  # Stale message
  stale_message: |
    This issue/PR has been automatically marked as stale because it has not had
    recent activity. It will be closed if no further activity occurs within 7 days.
    
  # Close message
  close_message: |
    This issue/PR was closed because it has been stale for 7 days with no activity.
    
  # Labels
  stale_label: 'stale'
  exempt_pr_labels:
    - 'pinned'
    - 'work-in-progress'
