name: Deploy React App to fresh-people.co.za

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy to FTP
        run: |
          lftp -u freshpeo,$FTP_PASSWORD -e "set ssl:verify-certificate no; mirror -R dist/ /home/freshpeo/public_html/ --exclude-glob .git* --exclude-glob node_modules/; quit" ftp://102.208.231.54
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
