# Release Drafter Configuration

template: |
  ## What's Changed

  $CHANGES

  ## Contributors

  $CONTRIBUTORS

categories:
  - title: "🚀 Features"
    label: "enhancement"
  - title: "🐛 Bug Fixes"
    label: "bug"
  - title: "📚 Documentation"
    label: "documentation"
  - title: "🧰 Maintenance"
    label: "maintenance"
  - title: "⚡ Performance"
    label: "performance"

version-resolver:
  major:
    labels:
      - "major"
  minor:
    labels:
      - "minor"
  patch:
    labels:
      - "patch"

change-template: '- $TITLE (#$NUMBER) @$AUTHOR'
change-title-escapes: '\<*_&'
