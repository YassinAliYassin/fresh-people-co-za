version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "automated"
    reviewers:
      - "YassinAliYassin"
    open-pull-requests-limit: 10
    target-branch: "main"
