name: Check FTP Secret

on:
  workflow_dispatch:

jobs:
  check-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Check secret length
        run: |
          echo "Password length: ${#FTP_PASSWORD}"
          echo "First 5 chars: ${FTP_PASSWORD:0:5}"
        env:
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
