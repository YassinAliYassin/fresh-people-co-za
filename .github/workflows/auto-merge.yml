name: Auto Merge

on:
  pull_request:
    types: [labeled, synchronize]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.labels.*.name, 'automerge')
    steps:
      - uses: actions/auto-merge@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          merge-method: squash
